name: Publish packages

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      - run: npm run build

      - name: Publish core
        if: startsWith(github.event.release.tag_name, 'core-v')
        run: npm publish --workspace=core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish db
        if: startsWith(github.event.release.tag_name, 'db-v')
        run: npm publish --workspace=db
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ui
        if: startsWith(github.event.release.tag_name, 'ui-v')
        run: npm publish --workspace=ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
