name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell

  - type: dropdown
    id: package
    attributes:
      label: Which package?
      options:
        - "@arb-dev/core"
        - "@arb-dev/db"
        - "@arb-dev/ui"
        - other / unsure
    validations:
      required: true
