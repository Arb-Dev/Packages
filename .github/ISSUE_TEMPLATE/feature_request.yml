name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point this addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should be built? Include any API or interface ideas if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: package
    attributes:
      label: Which package?
      options:
        - "@arb-dev/core"
        - "@arb-dev/db"
        - "@arb-dev/ui"
        - cross-cutting / new package
        - other / unsure
    validations:
      required: true
